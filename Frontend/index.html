<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Shoe Shop</title>

<style>
body{
    font-family: Arial;
    padding: 20px;
}

h1{
    color:#333;
}

#product-list{
    display:flex;
    gap:10px;
}

.product{
    border:1px solid #ddd;
    padding:10px;
    width:200px;
}
</style>

</head>

<body>

<h1>Danh sách giày</h1>

<button onclick="loadProducts()">Load Products</button>

<div id="product-list"></div>

<script>

async function loadProducts(){
    try{

        // gọi API backend
        const res = await fetch("/api/products")
        const data = await res.json()

        const list = document.getElementById("product-list")
        list.innerHTML = ""

        data.forEach(p => {
            const html = `
                <div class="product">
                    <h3>${p.name}</h3>
                    <p>Price: ${p.price}$</p>
                </div>
            `
            list.innerHTML += html
        })

    }catch(err){
        console.log(err)
        alert("Cannot connect to backend")
    }
}

</script>

</body>
</html>
