<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giỏ hàng - ShoeShop</title>
  <link rel="stylesheet" href="/Frontend/css/layout.css" />
  <link rel="stylesheet" href="/Frontend/css/cart.css" />
  <style>
    .page {
      width: 1200px;
      max-width: calc(100% - 40px);
      margin: 32px auto;
    }

    .page h1 {
      font-size: 34px;
      margin-bottom: 22px;
    }

    .cart-layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 24px;
      align-items: start;
    }

    .cart-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .cart-item {
      display: grid;
      grid-template-columns: 140px 1fr 220px;
      gap: 16px;
      background: white;
      border: 1px solid #e5e5e5;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.04);
    }

    .cart-item img {
      width: 140px;
      height: 110px;
      border-radius: 12px;
      object-fit: cover;
    }

    .cart-info h3 {
      margin-bottom: 10px;
      font-size: 22px;
    }

    .cart-info p {
      color: #555;
      margin-bottom: 8px;
    }

    .cart-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      gap: 12px;
    }

    .qty-box {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .qty-box button {
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 8px;
      background: #111;
      color: white;
      cursor: pointer;
      font-size: 18px;
    }

    .item-total {
      color: #d62828;
      font-size: 20px;
      font-weight: bold;
    }

    .remove-btn {
      border: none;
      border-radius: 8px;
      background: #e63946;
      color: white;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 600;
    }

    .cart-summary {
      background: #fafafa;
      border: 1px solid #e5e5e5;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.04);
    }

    .cart-summary h3 {
      margin-bottom: 16px;
      font-size: 24px;
    }

    .cart-summary p {
      margin-bottom: 12px;
      color: #444;
    }

    .summary-total {
      font-size: 24px;
      color: #d62828;
      font-weight: bold;
    }

    .summary-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 14px;
    }

    .summary-actions a,
    .summary-actions button {
      border: none;
      border-radius: 10px;
      padding: 12px;
      text-align: center;
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-dark {
      background: #111;
      color: white;
    }

    .btn-light {
      background: #ececec;
      color: #111;
    }

    .empty-cart {
      background: white;
      border: 1px dashed #ccc;
      border-radius: 16px;
      padding: 30px;
      text-align: center;
      color: #666;
      font-size: 18px;
    }

    @media (max-width: 900px) {
      .cart-layout {
        grid-template-columns: 1fr;
      }

      .cart-item {
        grid-template-columns: 1fr;
      }

      .cart-actions {
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div id="header"></div>

  <main class="page">
    <h1>Giỏ hàng của bạn</h1>
    <div class="cart-layout">
      <div id="cartList" class="cart-list"></div>
      <aside id="cartSummary" class="cart-summary"></aside>
    </div>
  </main>

  <div id="footer"></div>

  <script>
    const PRODUCTS_KEY = "shoeshop_products_v1";
    const USERS_KEY = "shoeshop_users_v1";
    const USER_KEY = "shoeshop_current_user_v1";
    const CART_KEY = "shoeshop_cart_v1";

    const defaultProducts = [
      {
        id: 1,
        name: "Nike Air Force 1",
        price: 2200000,
        category: "Sneaker",
        image: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=900&q=80",
        description: "Thiết kế trẻ trung, dễ phối đồ."
      }
    ];

    const defaultUsers = [
      { id: 1, fullName: "Admin", email: "admin@gmail.com", password: "123456", role: "admin" },
      { id: 2, fullName: "Staff", email: "staff@gmail.com", password: "123456", role: "staff" },
      { id: 3, fullName: "Customer", email: "customer@gmail.com", password: "123456", role: "customer" }
    ];

    function seedData() {
      if (!localStorage.getItem(PRODUCTS_KEY)) {
        localStorage.setItem(PRODUCTS_KEY, JSON.stringify(defaultProducts));
      }
      if (!localStorage.getItem(USERS_KEY)) {
        localStorage.setItem(USERS_KEY, JSON.stringify(defaultUsers));
      }
      if (!localStorage.getItem(CART_KEY)) {
        localStorage.setItem(CART_KEY, JSON.stringify([]));
      }
    }

    function getCart() {
      return JSON.parse(localStorage.getItem(CART_KEY)) || [];
    }

    function saveCart(cart) {
      localStorage.setItem(CART_KEY, JSON.stringify(cart));
    }

    async function loadComponent(id, file) {
      const res = await fetch(file);
      const html = await res.text();
      document.getElementById(id).innerHTML = html;

      if (id === "header") {
        renderHeaderAuth();
      }
    }

    function renderHeaderAuth() {
  const headerRight = document.getElementById("headerRight");
  if (!headerRight) return;

  const currentUser = JSON.parse(localStorage.getItem(USER_KEY));

  if (currentUser) {
    let extraLink = "";

    if (currentUser.role === "admin") {
      extraLink = `<a class="header-link" href="/Frontend/pages/admin-dashboard.html">Admin</a>`;
    } else if (currentUser.role === "staff") {
      extraLink = `<a class="header-link" href="/Frontend/pages/staff-dashboard.html">Staff</a>`;
    }

    headerRight.innerHTML = `
      <div id="notificationBellArea"></div>
      ${extraLink}
      <span class="user-text">Xin chào, ${currentUser.fullName || currentUser.email}</span>
      <button class="header-btn" onclick="logout()">Đăng xuất</button>
    `;

    renderNotificationBell();
  } else {
    headerRight.innerHTML = `
      <a class="header-link" href="/Frontend/pages/login.html">Đăng nhập</a>
      <a class="header-link" href="/Frontend/pages/register.html">Đăng ký</a>
    `;
  }
}

    function logout() {
      localStorage.removeItem(USER_KEY);
      window.location.href = "/Frontend/index.html";
    }

    function increaseQty(productId) {
      const cart = getCart();
      const item = cart.find(product => product.id === productId);
      if (!item) return;

      item.quantity += 1;
      saveCart(cart);
      renderCart();
    }

    function decreaseQty(productId) {
      let cart = getCart();
      const item = cart.find(product => product.id === productId);
      if (!item) return;

      item.quantity -= 1;
      cart = cart.filter(product => product.quantity > 0);

      saveCart(cart);
      renderCart();
    }

    function removeItem(productId) {
      let cart = getCart();
      cart = cart.filter(product => product.id !== productId);
      saveCart(cart);
      renderCart();
    }

    function renderCart() {
      const cart = getCart();
      const list = document.getElementById("cartList");
      const summary = document.getElementById("cartSummary");

      if (!cart.length) {
        list.innerHTML = `
          <div class="empty-cart">
            Giỏ hàng của bạn đang trống.<br><br>
            <a class="btn-dark" style="display:inline-block; padding:12px 18px; border-radius:10px; text-decoration:none; color:white;" href="/Frontend/pages/products.html">
              Tiếp tục mua sắm
            </a>
          </div>
        `;

        summary.innerHTML = `
          <h3>Tóm tắt đơn hàng</h3>
          <p>Số dòng sản phẩm: 0</p>
          <p class="summary-total">Tổng tiền: 0đ</p>
          <div class="summary-actions">
            <a class="btn-light" href="/Frontend/pages/products.html">Xem sản phẩm</a>
            <button class="btn-dark" disabled>Thanh toán</button>
          </div>
        `;
        return;
      }

      list.innerHTML = cart.map(item => `
        <div class="cart-item">
          <img src="${item.image}" alt="${item.name}">
          <div class="cart-info">
            <h3>${item.name}</h3>
            <p>Danh mục: ${item.category}</p>
            <p>Giá: ${item.price.toLocaleString("vi-VN")}đ</p>
          </div>
          <div class="cart-actions">
            <div class="qty-box">
              <button onclick="decreaseQty(${item.id})">-</button>
              <span>${item.quantity}</span>
              <button onclick="increaseQty(${item.id})">+</button>
            </div>
            <div class="item-total">${(item.price * item.quantity).toLocaleString("vi-VN")}đ</div>
            <button class="remove-btn" onclick="removeItem(${item.id})">Xóa</button>
          </div>
        </div>
      `).join("");

      const totalLines = cart.length;
      const totalAmount = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);

      summary.innerHTML = `
        <h3>Tóm tắt đơn hàng</h3>
        <p>Số dòng sản phẩm: ${totalLines}</p>
        <p class="summary-total">Tổng tiền: ${totalAmount.toLocaleString("vi-VN")}đ</p>
        <div class="summary-actions">
          <a class="btn-light" href="/Frontend/pages/products.html">Mua thêm</a>
          <button class="btn-dark" onclick="checkout()">Thanh toán</button>
        </div>
      `;
    }

    function checkout() {
        window.location.href = "/Frontend/pages/checkout.html";
    }

    seedData();
    loadComponent("header", "/Frontend/components/header.html");
    loadComponent("footer", "/Frontend/components/footer.html");
    renderCart();
  </script>
</body>
</html>
