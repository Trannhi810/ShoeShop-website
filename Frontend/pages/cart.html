<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giỏ hàng - ShoeShop</title>
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/Frontend/css/cart.css" />
  <style>
    .page {
      margin: 32px auto;
    }

    .page h1 {
      font-size: 34px;
      margin-bottom: 22px;
    }

    .cart-layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 24px;
      align-items: start;
    }

    .cart-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .cart-item {
      display: grid;
      grid-template-columns: 140px 1fr 220px;
      gap: 16px;
      background: white;
      border: 1px solid #e5e5e5;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.04);
    }

    .cart-item img {
      width: 140px;
      height: 110px;
      border-radius: 12px;
      object-fit: cover;
    }

    .cart-info h3 {
      margin-bottom: 10px;
      font-size: 22px;
    }

    .cart-info p {
      color: #555;
      margin-bottom: 8px;
    }

    .cart-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      gap: 12px;
    }

    .qty-box {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .qty-box button {
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 8px;
      background: #111;
      color: white;
      cursor: pointer;
      font-size: 18px;
    }

    .item-total {
      color: #d62828;
      font-size: 20px;
      font-weight: bold;
    }

    .remove-btn {
      border: none;
      border-radius: 8px;
      background: #e63946;
      color: white;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 600;
    }

    .cart-summary {
      background: #fafafa;
      border: 1px solid #e5e5e5;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.04);
    }

    .cart-summary h3 {
      margin-bottom: 16px;
      font-size: 24px;
    }

    .cart-summary p {
      margin-bottom: 12px;
      color: #444;
    }

    .summary-total {
      font-size: 24px;
      color: #d62828;
      font-weight: bold;
    }

    .summary-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 14px;
    }

    .summary-actions a,
    .summary-actions button {
      border: none;
      border-radius: 10px;
      padding: 12px;
      text-align: center;
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-dark {
      background: #111;
      color: white;
    }

    .btn-light {
      background: #ececec;
      color: #111;
    }

    .empty-cart {
      background: white;
      border: 1px dashed #ccc;
      border-radius: 16px;
      padding: 30px;
      text-align: center;
      color: #666;
      font-size: 18px;
    }

    @media (max-width: 900px) {
      .cart-layout {
        grid-template-columns: 1fr;
      }

      .cart-item {
        grid-template-columns: 1fr;
      }

      .cart-actions {
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div id="header"></div>

  <main class="page">
    <h1>Giỏ hàng của bạn</h1>
    <div class="cart-layout">
      <div id="cartList" class="cart-list"></div>
      <aside id="cartSummary" class="cart-summary"></aside>
    </div>
  </main>

  <div id="footer"></div>

  <!-- Thêm các file JS gọi API -->
  <script src="/js/admin-utils.js"></script>
  <script src="/js/api-client.js"></script>
  <script>
    const USER_KEY = "shoeshop_user";

    async function loadComponent(id, file) {
      try {
        const res = await fetch(file);
        const html = await res.text();
        document.getElementById(id).innerHTML = html;

        if (id === "header") {
          renderHeaderAuth();
        }
      } catch (error) {
        console.error("Lỗi tải component:", error);
      }
    }

    function renderHeaderAuth() {
      const headerRight = document.getElementById("headerRight");
      if (!headerRight) return;

      const currentUser = JSON.parse(localStorage.getItem(USER_KEY));

      if (currentUser) {
        let extraLink = "";

        if (currentUser.role === "ADMIN") {
          extraLink = `<a class="header-link" href="/Frontend/pages/admin-dashboard.html">Admin</a>`;
        } else if (currentUser.role === "STAFF") {
          extraLink = `<a class="header-link" href="/Frontend/pages/staff-dashboard.html">Staff</a>`;
        }

        headerRight.innerHTML = `
          <div id="notificationBellArea"></div>
          ${extraLink}
          <span class="user-text">Xin chào, ${currentUser.fullName || currentUser.email}</span>
          <button class="header-btn" onclick="logout()">Đăng xuất</button>
        `;

        // renderNotificationBell(); // Nếu có hàm này
      } else {
        headerRight.innerHTML = `
          <a class="header-link" href="/Frontend/pages/auth.html">Đăng nhập</a>
          <a class="header-link" href="/Frontend/pages/auth.html?tab=register">Đăng ký</a>
        `;
      }
    }

    function logout() {
      localStorage.removeItem(USER_KEY);
      localStorage.removeItem("shoeshop_token");
      window.location.href = "/Frontend/index.html";
    }

    async function increaseQty(itemId, currentQty) {
      try {
        await cartApi.updateQuantity(itemId, currentQty + 1);
        renderCart();
      } catch (error) {
        alert(error.message);
      }
    }

    async function decreaseQty(itemId, currentQty) {
      if (currentQty <= 1) {
        return removeItem(itemId);
      }
      try {
        await cartApi.updateQuantity(itemId, currentQty - 1);
        renderCart();
      } catch (error) {
        alert(error.message);
      }
    }

    async function removeItem(itemId) {
      if (!confirm("Bạn có chắc muốn xóa sản phẩm này khỏi giỏ hàng?")) return;
      try {
        await cartApi.removeItem(itemId);
        renderCart();
      } catch (error) {
        alert(error.message);
      }
    }

    async function renderCart() {
      const list = document.getElementById("cartList");
      const summary = document.getElementById("cartSummary");
      const currentUser = JSON.parse(localStorage.getItem(USER_KEY));

      if (!currentUser) {
        list.innerHTML = `
          <div class="empty-cart">
            Bạn cần đăng nhập để xem giỏ hàng.<br><br>
            <a class="btn-dark" style="display:inline-block; padding:12px 18px; border-radius:10px; text-decoration:none; color:white;" href="/Frontend/pages/auth.html">
              Đăng nhập ngay
            </a>
          </div>
        `;
        summary.innerHTML = "";
        return;
      }

      try {
        const cartData = await cartApi.getCart();
        const cartItems = cartData.items || [];

        if (!cartItems.length) {
          list.innerHTML = `
            <div class="empty-cart">
            Giỏ hàng của bạn đang trống.<br><br>
            <a class="btn-dark" style="display:inline-block; padding:12px 18px; border-radius:10px; text-decoration:none; color:white;" href="/pages/products.html">
              Tiếp tục mua sắm
            </a>
          </div>
          `;

          summary.innerHTML = `
            <h3>Tóm tắt đơn hàng</h3>
            <p>Số dòng sản phẩm: 0</p>
            <p class="summary-total">Tổng tiền: 0đ</p>
            <div class="summary-actions">
              <a class="btn-light" href="/pages/products.html">Xem sản phẩm</a>
              <button class="btn-dark" disabled>Thanh toán</button>
            </div>
          `;
          return;
        }

        list.innerHTML = cartItems.map(item => `
          <div class="cart-item">
            <img src="${item.image || '/images/placeholder.jpg'}" alt="${item.name}">
            <div class="cart-info">
              <h3>${item.name}</h3>
              <p>Phân loại: ${item.color} - ${item.size}</p>
              <p>Giá: ${item.price.toLocaleString("vi-VN")}đ</p>
            </div>
            <div class="cart-actions">
              <div class="qty-box">
                <button onclick="decreaseQty('${item.id}', ${item.quantity})">-</button>
                <span>${item.quantity}</span>
                <button onclick="increaseQty('${item.id}', ${item.quantity})">+</button>
              </div>
              <div class="item-total">${(item.price * item.quantity).toLocaleString("vi-VN")}đ</div>
              <button class="remove-btn" onclick="removeItem('${item.id}')">Xóa</button>
            </div>
          </div>
        `).join("");

        const totalLines = cartItems.length;
        const totalAmount = cartItems.reduce((sum, item) => sum + item.price * item.quantity, 0);

        summary.innerHTML = `
          <h3>Tóm tắt đơn hàng</h3>
          <p>Số dòng sản phẩm: ${totalLines}</p>
          <p class="summary-total">Tổng tiền: ${totalAmount.toLocaleString("vi-VN")}đ</p>
          <div class="summary-actions">
            <a class="btn-light" href="/pages/products.html">Mua thêm</a>
            <button class="btn-dark" onclick="checkout()">Thanh toán</button>
          </div>
        `;
      } catch (error) {
        list.innerHTML = `<div class="empty-cart">Lỗi tải giỏ hàng: ${error.message}</div>`;
      }
    }

    function checkout() {
        window.location.href = "/Frontend/pages/checkout.html";
    }

    loadComponent("header", "/components/header.html");
    loadComponent("footer", "/components/footer.html");
    renderCart();
  </script>
</body>
</html>
