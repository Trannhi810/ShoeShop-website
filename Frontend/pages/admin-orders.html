<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quản lý đơn hàng - ShoeShop</title>
  <link rel="stylesheet" href="/Frontend/css/layout.css" />
  <style>
    .page {
      width: 1200px;
      max-width: calc(100% - 40px);
      margin: 32px auto;
    }

    .panel {
      background: white;
      border: 1px solid #e5e5e5;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.04);
    }

    h1 {
      margin-bottom: 18px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      text-align: left;
      padding: 12px 10px;
      border-bottom: 1px solid #eee;
      vertical-align: top;
    }

    th {
      background: #f7f7f7;
    }

    select {
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .empty-box {
      background: white;
      border: 1px dashed #ccc;
      border-radius: 16px;
      padding: 30px;
      text-align: center;
      color: #666;
      font-size: 18px;
    }

    .status-badge {
      display: inline-block;
      padding: 7px 10px;
      border-radius: 16px;
      font-size: 13px;
      font-weight: 600;
    }

    .pending {
      background: #fff3cd;
      color: #856404;
    }

    .shipping {
      background: #d1ecf1;
      color: #0c5460;
    }

    .completed {
      background: #d4edda;
      color: #155724;
    }

    .cancelled {
      background: #f8d7da;
      color: #721c24;
    }
  </style>
</head>
<body>
  <div id="header"></div>

  <main class="page" id="adminOrdersContent"></main>

  <div id="footer"></div>
  
  <script>
    const USER_KEY = "shoeshop_current_user_v1";
    const ORDERS_KEY = "shoeshop_orders_v1";

    async function loadComponent(id, file) {
      const res = await fetch(file);
      const html = await res.text();
      document.getElementById(id).innerHTML = html;
      if (id === "header") renderHeaderAuth();
    }

    function renderHeaderAuth() {
  const headerRight = document.getElementById("headerRight");
  if (!headerRight) return;

  const currentUser = JSON.parse(localStorage.getItem(USER_KEY));

  if (currentUser) {
    let extraLink = "";

    if (currentUser.role === "admin") {
      extraLink = `<a class="header-link" href="/Frontend/pages/admin-dashboard.html">Admin</a>`;
    } else if (currentUser.role === "staff") {
      extraLink = `<a class="header-link" href="/Frontend/pages/staff-dashboard.html">Staff</a>`;
    }

    headerRight.innerHTML = `
      <div id="notificationBellArea"></div>
      ${extraLink}
      <span class="user-text">Xin chào, ${currentUser.fullName || currentUser.email}</span>
      <button class="header-btn" onclick="logout()">Đăng xuất</button>
    `;

    renderNotificationBell();
  } else {
    headerRight.innerHTML = `
      <a class="header-link" href="/Frontend/pages/login.html">Đăng nhập</a>
      <a class="header-link" href="/Frontend/pages/register.html">Đăng ký</a>
    `;
  }
}

    function logout() {
      localStorage.removeItem(USER_KEY);
      window.location.href = "/Frontend/index.html";
    }

    function getOrders() {
      return JSON.parse(localStorage.getItem(ORDERS_KEY)) || [];
    }

    function saveOrders(orders) {
      localStorage.setItem(ORDERS_KEY, JSON.stringify(orders));
    }

    function getStatusClass(status) {
      if (status === "Chờ xử lý") return "pending";
      if (status === "Đang giao") return "shipping";
      if (status === "Hoàn tất") return "completed";
      if (status === "Hủy") return "cancelled";
      return "pending";
    }

    function renderAdminOrders() {
      const currentUser = JSON.parse(localStorage.getItem(USER_KEY));
      const container = document.getElementById("adminOrdersContent");

      if (!currentUser || currentUser.role !== "admin") {
        container.innerHTML = `<div class="empty-box">Bạn không có quyền truy cập trang này.</div>`;
        return;
      }

      const orders = getOrders();

      container.innerHTML = `
        <div class="panel">
          <h1>Quản lý đơn hàng</h1>

          ${
            orders.length
              ? `
                <table>
                  <thead>
                    <tr>
                      <th>Mã đơn</th>
                      <th>Khách hàng</th>
                      <th>Ngày đặt</th>
                      <th>Trạng thái hiện tại</th>
                      <th>Cập nhật trạng thái</th>
                      <th>Tổng tiền</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${orders.map(order => `
                      <tr>
                        <td>#${order.id}</td>
                        <td>${order.customerName}</td>
                        <td>${order.createdAt}</td>
                        <td><span class="status-badge ${getStatusClass(order.status)}">${order.status}</span></td>
                        <td>
                          <select onchange="changeOrderStatus(${order.id}, this.value)">
                            <option value="Chờ xử lý" ${order.status === "Chờ xử lý" ? "selected" : ""}>Chờ xử lý</option>
                            <option value="Đang giao" ${order.status === "Đang giao" ? "selected" : ""}>Đang giao</option>
                            <option value="Hoàn tất" ${order.status === "Hoàn tất" ? "selected" : ""}>Hoàn tất</option>
                            <option value="Hủy" ${order.status === "Hủy" ? "selected" : ""}>Hủy</option>
                          </select>
                        </td>
                        <td>${order.total.toLocaleString("vi-VN")}đ</td>
                      </tr>
                    `).join("")}
                  </tbody>
                </table>
              `
              : `<div>Chưa có đơn hàng nào.</div>`
          }
        </div>
      `;
    }

    function changeOrderStatus(orderId, newStatus) {
  const orders = getOrders();
  const order = orders.find(item => item.id === orderId);
  if (!order) return;

  const oldStatus = order.status;
  order.status = newStatus;
  saveOrders(orders);

  if (oldStatus !== newStatus) {
    addNotification({
      title: "Đơn hàng được cập nhật",
      message: `Đơn hàng #${order.id} đã chuyển từ "${oldStatus}" sang "${newStatus}".`,
      role: "customer",
      type: "info"
    });

    addNotification({
      title: "Admin cập nhật đơn hàng",
      message: `Đơn hàng #${order.id} của ${order.customerName} đã đổi sang "${newStatus}".`,
      role: "staff",
      type: "warning"
    });

    addNotification({
      title: "Cập nhật trạng thái đơn",
      message: `Bạn vừa đổi trạng thái đơn #${order.id} sang "${newStatus}".`,
      role: "admin",
      type: "success"
    });
  }

  renderAdminOrders();
}
    

    loadComponent("header", "/Frontend/components/header.html");
    loadComponent("footer", "/Frontend/components/footer.html");
    renderAdminOrders();
  </script>
</body>
</html>
