<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoe Shop - Xác Thực Hệ Thống</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/auth.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div class="auth-page">
        <div class="auth-box">
            <div class="auth-header">
                <button class="toggle-btn active" onclick="switchTab('login')">Đăng Nhập</button>
                <button class="toggle-btn" onclick="switchTab('register')">Đăng Ký Khởi Tạo</button>
                <div class="toggle-indicator" id="indicator"></div>
            </div>

            <div class="form-slider" id="form-slider">
                <!-- Form Đăng Nhập -->
                <div class="form-section active" id="section-login">
                    <h1 style="margin-bottom: 10px; font-size: 32px;">Đăng Nhập</h1>
                    <p class="auth-subtitle">Đăng nhập để mua sắm, quản lý giỏ hàng và theo dõi đơn hàng.</p>
                    <form id="login-form" class="auth-form" onsubmit="handleLogin(event)">
                        <div class="input-group">
                            <input type="email" id="loginEmail" placeholder="Email hoặc tên tài khoản" required>
                            <i class="fa-solid fa-envelope input-icon"></i>
                        </div>
                        <div class="input-group">
                            <input type="password" id="loginPassword" placeholder="Mật khẩu" required>
                            <i class="fa-solid fa-lock input-icon"></i>
                            <i class="fa-solid fa-eye password-toggle" onclick="togglePassword('loginPassword', this)"></i>
                        </div>
                        <button type="submit" class="btn-submit" id="btn-login">
                            <span class="btn-text">Đăng nhập</span>
                            <div class="loading-spinner"></div>
                        </button>
                        
                        <div class="divider"><span>Hoặc đăng nhập bằng</span></div>
                        
                        <!-- Phần hiển thị nút Google theo chuẩn GSI -->
                        <div style="display: flex; justify-content: center; width: 100%;">
                            <div id="g_id_onload"
                                 data-client_id="839295398542-omtv5qflf1qgej5b1dpotj95a4d80qeg.apps.googleusercontent.com"
                                 data-context="signin"
                                 data-ux_mode="popup"
                                 data-callback="handleGoogleCallback"
                                 data-auto_prompt="false">
                            </div>
                            <div class="g_id_signin"
                                 data-type="standard"
                                 data-shape="rectangular"
                                 data-theme="outline"
                                 data-text="signin_with"
                                 data-size="large"
                                 data-logo_alignment="left">
                            </div>
                        </div>
                    </form>
                </div>

                <!-- Form Đăng Ký -->
                <div class="form-section" id="section-register">
                    <h1 style="margin-bottom: 10px; font-size: 32px;">Đăng Ký</h1>
                    <p class="auth-subtitle">Tạo tài khoản mới để trải nghiệm mua sắm thuận tiện hơn.</p>
                    <form id="register-form" class="auth-form" onsubmit="handleRegister(event)">
                        <div class="input-group">
                            <input type="text" id="registerName" placeholder="Họ và tên" required>
                            <i class="fa-solid fa-user input-icon"></i>
                        </div>
                        <div class="input-group">
                            <input type="email" id="registerEmail" placeholder="Email" required>
                            <i class="fa-solid fa-envelope input-icon"></i>
                        </div>
                        
                        <div class="input-group">
                            <input type="password" id="registerPassword" placeholder="Mật khẩu" required minlength="4">
                            <i class="fa-solid fa-lock input-icon"></i>
                            <i class="fa-solid fa-eye password-toggle" onclick="togglePassword('registerPassword', this)"></i>
                        </div>
                        
                        <div class="input-group">
                            <input type="password" id="registerConfirmPassword" placeholder="Xác nhận mật khẩu" required minlength="4">
                            <i class="fa-solid fa-shield-halved input-icon"></i>
                            <i class="fa-solid fa-eye password-toggle" onclick="togglePassword('registerConfirmPassword', this)"></i>
                        </div>

                        <div class="input-group">
                            <input type="text" id="registerPhone" placeholder="Số điện thoại">
                            <i class="fa-solid fa-phone input-icon"></i>
                        </div>

                        <div class="input-group">
                            <input type="text" id="registerAddress" placeholder="Địa chỉ giao hàng">
                            <i class="fa-solid fa-map-location-dot input-icon"></i>
                        </div>

                        <span class="hint-text">* Số điện thoại và địa chỉ không bắt buộc, bạn có thể bổ sung ở hồ sơ người dùng sau khi đăng nhập thành công.</span>

                        <button type="submit" class="btn-submit" id="btn-register">
                            <span class="btn-text">Tạo Tài Khoản</span>
                            <div class="loading-spinner"></div>
                        </button>
                    </form>
                </div>
            </div>

            <div id="message-box" class="message-box"></div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
</body>
</html>
