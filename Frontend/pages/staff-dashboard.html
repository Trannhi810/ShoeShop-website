<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Dashboard - ShoeShop</title>
  <link rel="stylesheet" href="/Frontend/css/layout.css" />
  <style>
    .page {
      width: 1200px;
      max-width: calc(100% - 40px);
      margin: 32px auto;
    }

    h1 {
      margin-bottom: 22px;
      font-size: 34px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin-bottom: 26px;
    }

    .stat-card, .panel {
      background: white;
      border: 1px solid #e5e5e5;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.04);
    }

    .stat-card h3 {
      color: #666;
      font-size: 15px;
      margin-bottom: 8px;
    }

    .value {
      font-size: 30px;
      font-weight: bold;
    }

    .panel h2 {
      margin-bottom: 14px;
    }

    .quick-links {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .quick-links a {
      padding: 12px 18px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      background: #111;
      color: white;
    }

    .empty-box {
      background: white;
      border: 1px dashed #ccc;
      border-radius: 16px;
      padding: 30px;
      text-align: center;
      color: #666;
      font-size: 18px;
    }

    @media (max-width: 900px) {
      .stats-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="header"></div>

  <main class="page" id="staffDashboardContent"></main>

  <div id="footer"></div>

  <script>
    const PRODUCTS_KEY = "shoeshop_products_v1";
    const ORDERS_KEY = "shoeshop_orders_v1";

    async function loadComponent(id, file) {
      const res = await fetch(file);
      const html = await res.text();
      document.getElementById(id).innerHTML = html;
      if (id === "header") renderHeaderAuth();
    }

    function renderHeaderAuth() {
  const headerRight = document.getElementById("headerRight");
  if (!headerRight) return;

  const currentUser = JSON.parse(localStorage.getItem(USER_KEY));

  if (currentUser) {
    let extraLink = "";

    if (currentUser.role === "admin") {
      extraLink = `<a class="header-link" href="/Frontend/pages/admin-dashboard.html">Admin</a>`;
    } else if (currentUser.role === "staff") {
      extraLink = `<a class="header-link" href="/Frontend/pages/staff-dashboard.html">Staff</a>`;
    }

    headerRight.innerHTML = `
      <div id="notificationBellArea"></div>
      ${extraLink}
      <span class="user-text">Xin chào, ${currentUser.fullName || currentUser.email}</span>
      <button class="header-btn" onclick="logout()">Đăng xuất</button>
    `;

    renderNotificationBell();
  } else {
    headerRight.innerHTML = `
      <a class="header-link" href="/Frontend/pages/login.html">Đăng nhập</a>
      <a class="header-link" href="/Frontend/pages/register.html">Đăng ký</a>
    `;
  }
}

    function logout() {
      localStorage.removeItem(USER_KEY);
      window.location.href = "/Frontend/index.html";
    }

    function getOrders() {
      return JSON.parse(localStorage.getItem(ORDERS_KEY)) || [];
    }

    function getProducts() {
      return JSON.parse(localStorage.getItem(PRODUCTS_KEY)) || [];
    }

    function renderStaffDashboard() {
      const currentUser = JSON.parse(localStorage.getItem(USER_KEY));
      const container = document.getElementById("staffDashboardContent");

      if (!currentUser || (currentUser.role !== "staff" && currentUser.role !== "admin")) {
        container.innerHTML = `
          <div class="empty-box">
            Bạn không có quyền truy cập trang staff.
          </div>
        `;
        return;
      }

      const orders = getOrders();
      const products = getProducts();
      const pendingOrders = orders.filter(order => order.status === "Chờ xử lý").length;
      const shippingOrders = orders.filter(order => order.status === "Đang giao").length;

      container.innerHTML = `
        <h1>Staff Dashboard</h1>

        <div class="stats-grid">
          <div class="stat-card">
            <h3>Đơn chờ xử lý</h3>
            <div class="value">${pendingOrders}</div>
          </div>

          <div class="stat-card">
            <h3>Đơn đang giao</h3>
            <div class="value">${shippingOrders}</div>
          </div>

          <div class="stat-card">
            <h3>Số sản phẩm</h3>
            <div class="value">${products.length}</div>
          </div>
        </div>

        <div class="panel">
          <h2>Chức năng nhanh</h2>
          <div class="quick-links">
            <a href="/Frontend/pages/staff-orders.html">Quản lý đơn hàng</a>
            <a href="/Frontend/pages/staff-products.html">Quản lý sản phẩm</a>
          </div>
        </div>
      `;
    }

    loadComponent("header", "/Frontend/components/header.html");
    loadComponent("footer", "/Frontend/components/footer.html");
    renderStaffDashboard();
  </script>
</body>
</html>
