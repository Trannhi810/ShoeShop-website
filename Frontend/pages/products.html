<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sản phẩm - ShoeShop</title>
  <link rel="stylesheet" href="/Frontend/css/layout.css" />
  <style>
    .page {
      width: 1200px;
      max-width: calc(100% - 40px);
      margin: 32px auto;
    }

    .page-header {
      margin-bottom: 24px;
    }

    .page-header h1 {
      font-size: 34px;
      margin-bottom: 8px;
    }

    .page-header p {
      color: #666;
      font-size: 16px;
    }

    .filter-box {
      display: grid;
      grid-template-columns: 1.6fr 1fr 1fr auto auto;
      gap: 12px;
      background: #f7f7f7;
      border: 1px solid #eaeaea;
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 26px;
    }

    .filter-box input,
    .filter-box select,
    .filter-box button {
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 15px;
    }

    .filter-box button {
      background: #111;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }

    .filter-box button.secondary {
      background: #ececec;
      color: #111;
    }

    .result-info {
      margin-bottom: 18px;
      color: #555;
      font-size: 15px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    .product-card {
      background: white;
      border: 1px solid #e5e5e5;
      border-radius: 18px;
      overflow: hidden;
      transition: 0.25s;
      box-shadow: 0 6px 20px rgba(0,0,0,0.04);
    }

    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 26px rgba(0,0,0,0.08);
    }

    .product-image {
      width: 100%;
      height: 210px;
      object-fit: cover;
      display: block;
      background: #f3f3f3;
    }

    .product-body {
      padding: 16px;
    }

    .product-category {
      color: #777;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .product-name {
      font-size: 21px;
      font-weight: 700;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .product-price {
      color: #d62828;
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .product-desc {
      color: #555;
      font-size: 14px;
      line-height: 1.5;
      min-height: 44px;
      margin-bottom: 14px;
    }

    .actions {
      display: flex;
      gap: 10px;
    }

    .actions button,
    .actions a {
      flex: 1;
      padding: 11px 12px;
      border-radius: 10px;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      border: none;
      font-weight: 600;
      font-size: 14px;
    }

    .btn-dark {
      background: #111;
      color: white;
    }

    .btn-soft {
      background: #f1f1f1;
      color: #111;
    }

    .empty {
      color: #666;
      font-size: 18px;
      padding: 24px 0;
      text-align: center;
      background: white;
      border: 1px dashed #ccc;
      border-radius: 16px;
    }

    @media (max-width: 900px) {
      .filter-box {
        grid-template-columns: 1fr;
      }

      .page-header h1 {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div id="header"></div>

  <main class="page">
    <div class="page-header">
      <h1>Danh sách sản phẩm</h1>
      <p>Tìm kiếm và chọn đôi giày phù hợp với phong cách của bạn.</p>
    </div>

    <div class="filter-box">
      <input type="text" id="searchInput" placeholder="Tìm theo tên sản phẩm..." />
      <select id="categoryFilter">
        <option value="">Tất cả danh mục</option>
        <option value="Sneaker">Sneaker</option>
        <option value="Running">Running</option>
        <option value="Casual">Casual</option>
      </select>
      <select id="priceFilter">
        <option value="">Tất cả mức giá</option>
        <option value="under-2000000">Dưới 2 triệu</option>
        <option value="2000000-3000000">Từ 2 đến 3 triệu</option>
        <option value="over-3000000">Trên 3 triệu</option>
      </select>
      <button onclick="applyFilters()">Lọc</button>
      <button class="secondary" onclick="resetFilters()">Đặt lại</button>
    </div>

    <div id="resultInfo" class="result-info"></div>
    <div id="productList" class="product-grid"></div>
  </main>

  <div id="footer"></div>

  <script>
    const PRODUCTS_KEY = "shoeshop_products_v1";
    const USERS_KEY = "shoeshop_users_v1";
    const USER_KEY = "shoeshop_current_user_v1";
    const CART_KEY = "shoeshop_cart_v1";

    const defaultProducts = [
      {
        id: 1,
        name: "Nike Air Force 1",
        price: 2200000,
        category: "Sneaker",
        image: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=900&q=80",
        description: "Thiết kế trẻ trung, dễ phối đồ."
      },
      {
        id: 2,
        name: "Adidas Ultraboost",
        price: 3200000,
        category: "Running",
        image: "https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?auto=format&fit=crop&w=900&q=80",
        description: "Êm ái, phù hợp chạy bộ hằng ngày."
      },
      {
        id: 3,
        name: "Converse Classic",
        price: 1500000,
        category: "Casual",
        image: "https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77?auto=format&fit=crop&w=900&q=80",
        description: "Phong cách basic cổ điển."
      },
      {
        id: 4,
        name: "Puma RS-X",
        price: 2700000,
        category: "Sneaker",
        image: "https://images.unsplash.com/photo-1608231387042-66d1773070a5?auto=format&fit=crop&w=900&q=80",
        description: "Kiểu dáng thể thao hiện đại."
      },
      {
        id: 5,
        name: "New Balance 530",
        price: 2600000,
        category: "Sneaker",
        image: "https://images.unsplash.com/photo-1543508282-6319a3e2621f?auto=format&fit=crop&w=900&q=80",
        description: "Nhẹ, êm chân, hợp dùng hằng ngày."
      },
      {
        id: 6,
        name: "Vans Old Skool",
        price: 1800000,
        category: "Casual",
        image: "https://images.unsplash.com/photo-1491553895911-0055eca6402d?auto=format&fit=crop&w=900&q=80",
        description: "Phong cách basic năng động."
      }
    ];

    const defaultUsers = [
      { id: 1, fullName: "Admin", email: "admin@gmail.com", password: "123456", role: "admin" },
      { id: 2, fullName: "Staff", email: "staff@gmail.com", password: "123456", role: "staff" },
      { id: 3, fullName: "Customer", email: "customer@gmail.com", password: "123456", role: "customer" }
    ];

    function seedData() {
      if (!localStorage.getItem(PRODUCTS_KEY)) {
        localStorage.setItem(PRODUCTS_KEY, JSON.stringify(defaultProducts));
      }
      if (!localStorage.getItem(USERS_KEY)) {
        localStorage.setItem(USERS_KEY, JSON.stringify(defaultUsers));
      }
      if (!localStorage.getItem(CART_KEY)) {
        localStorage.setItem(CART_KEY, JSON.stringify([]));
      }
    }

    function getProducts() {
      return JSON.parse(localStorage.getItem(PRODUCTS_KEY)) || [];
    }

    function getCart() {
      return JSON.parse(localStorage.getItem(CART_KEY)) || [];
    }

    function saveCart(cart) {
      localStorage.setItem(CART_KEY, JSON.stringify(cart));
    }

    function addToCart(productId) {
      const products = getProducts();
      const product = products.find(item => item.id === productId);
      if (!product) return;

      const cart = getCart();
      const existing = cart.find(item => item.id === productId);

      if (existing) {
        existing.quantity += 1;
      } else {
        cart.push({ ...product, quantity: 1 });
      }

      saveCart(cart);
      alert("Đã thêm sản phẩm vào giỏ hàng");
    }

    async function loadComponent(id, file) {
      const res = await fetch(file);
      const html = await res.text();
      document.getElementById(id).innerHTML = html;

      if (id === "header") {
        renderHeaderAuth();
      }
    }

    function renderHeaderAuth() {
  const headerRight = document.getElementById("headerRight");
  if (!headerRight) return;

  const currentUser = JSON.parse(localStorage.getItem(USER_KEY));

  if (currentUser) {
    let extraLink = "";

    if (currentUser.role === "admin") {
      extraLink = `<a class="header-link" href="/Frontend/pages/admin-dashboard.html">Admin</a>`;
    } else if (currentUser.role === "staff") {
      extraLink = `<a class="header-link" href="/Frontend/pages/staff-dashboard.html">Staff</a>`;
    }

    headerRight.innerHTML = `
      <div id="notificationBellArea"></div>
      ${extraLink}
      <span class="user-text">Xin chào, ${currentUser.fullName || currentUser.email}</span>
      <button class="header-btn" onclick="logout()">Đăng xuất</button>
    `;

    renderNotificationBell();
  } else {
    headerRight.innerHTML = `
      <a class="header-link" href="/Frontend/pages/login.html">Đăng nhập</a>
      <a class="header-link" href="/Frontend/pages/register.html">Đăng ký</a>
    `;
  }
}

    function logout() {
      localStorage.removeItem(USER_KEY);
      window.location.href = "/Frontend/index.html";
    }

    function renderProducts(items) {
      const list = document.getElementById("productList");
      const resultInfo = document.getElementById("resultInfo");

      resultInfo.textContent = `Tìm thấy ${items.length} sản phẩm`;

      if (!items.length) {
        list.innerHTML = `<div class="empty">Không tìm thấy sản phẩm phù hợp.</div>`;
        return;
      }

      list.innerHTML = items.map(product => `
        <div class="product-card">
          <img class="product-image" src="${product.image}" alt="${product.name}">
          <div class="product-body">
            <div class="product-category">${product.category}</div>
            <div class="product-name">${product.name}</div>
            <div class="product-price">${product.price.toLocaleString("vi-VN")}đ</div>
            <div class="product-desc">${product.description}</div>
            <div class="actions">
                <button class="btn-dark" onclick="addToCart(${product.id})">Thêm vào giỏ</button>
                <a class="btn-soft" href="/Frontend/pages/product-detail.html?id=${product.id}">Chi tiết</a>
            </div>
          </div>
        </div>
      `).join("");
    }

    function applyFilters() {
      const searchValue = document.getElementById("searchInput").value.trim().toLowerCase();
      const categoryValue = document.getElementById("categoryFilter").value;
      const priceValue = document.getElementById("priceFilter").value;

      let items = [...getProducts()];

      if (searchValue) {
        items = items.filter(product =>
          product.name.toLowerCase().includes(searchValue)
        );
      }

      if (categoryValue) {
        items = items.filter(product => product.category === categoryValue);
      }

      if (priceValue === "under-2000000") {
        items = items.filter(product => product.price < 2000000);
      }

      if (priceValue === "2000000-3000000") {
        items = items.filter(product => product.price >= 2000000 && product.price <= 3000000);
      }

      if (priceValue === "over-3000000") {
        items = items.filter(product => product.price > 3000000);
      }

      renderProducts(items);
    }

    function resetFilters() {
      document.getElementById("searchInput").value = "";
      document.getElementById("categoryFilter").value = "";
      document.getElementById("priceFilter").value = "";
      renderProducts(getProducts());
    }

    seedData();
    loadComponent("header", "/components/header.html");
    loadComponent("footer", "/components/footer.html");
    renderProducts(getProducts());
  </script>
</body>
</html>
