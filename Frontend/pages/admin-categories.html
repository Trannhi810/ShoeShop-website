<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quản lý danh mục - ShoeShop</title>
  <link rel="stylesheet" href="/Frontend/css/layout.css" />
  <style>
    .page {
      width: 1200px;
      max-width: calc(100% - 40px);
      margin: 32px auto;
    }

    .panel {
      background: white;
      border: 1px solid #e5e5e5;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.04);
      margin-bottom: 24px;
    }

    h1, h2 {
      margin-bottom: 16px;
    }

    .form-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .form-row input {
      flex: 1;
      min-width: 240px;
      padding: 12px 14px;
      border: 1px solid #ccc;
      border-radius: 10px;
    }

    .btn-dark,
    .btn-danger,
    .btn-edit,
    .btn-light {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-dark {
      background: #111;
      color: white;
    }

    .btn-danger {
      background: #e63946;
      color: white;
    }

    .btn-edit {
      background: #1d3557;
      color: white;
    }

    .btn-light {
      background: #ececec;
      color: #111;
    }

    .msg {
      margin-top: 12px;
      min-height: 20px;
      color: green;
      font-size: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      text-align: left;
      padding: 12px 10px;
      border-bottom: 1px solid #eee;
    }

    th {
      background: #f7f7f7;
    }

    .empty-box {
      background: white;
      border: 1px dashed #ccc;
      border-radius: 16px;
      padding: 30px;
      text-align: center;
      color: #666;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div id="header"></div>

  <main class="page" id="adminCategoriesContent"></main>

  <div id="footer"></div>

  <script src="/Frontend/js/notify.js"></script>
  <script>
    const CATEGORIES_KEY = "shoeshop_categories_v1";
    let editingCategoryIndex = null;

    async function loadComponent(id, file) {
      try {
        const res = await fetch(file);
        const html = await res.text();
        document.getElementById(id).innerHTML = html;
        if (id === "header") renderHeaderAuth();
      } catch (error) {
        console.log("Lỗi load component:", error);
      }
    }

    function renderHeaderAuth() {
      const headerRight = document.getElementById("headerRight");
      if (!headerRight) return;

      const currentUser = JSON.parse(localStorage.getItem(USER_KEY));

      if (currentUser) {
        headerRight.innerHTML = `
          <div id="notificationBellArea"></div>
          <a class="header-link" href="/Frontend/pages/admin-dashboard.html">Admin</a>
          <span class="user-text">Xin chào, ${currentUser.fullName || currentUser.email}</span>
          <button class="header-btn" onclick="logout()">Đăng xuất</button>
        `;

        if (typeof renderNotificationBell === "function") {
          renderNotificationBell();
        }
      } else {
        headerRight.innerHTML = `
          <a class="header-link" href="/Frontend/pages/auth.html">Đăng nhập</a>
          <a class="header-link" href="/Frontend/pages/auth.html?tab=register">Đăng ký</a>
        `;
      }
    }

    function logout() {
      localStorage.removeItem(USER_KEY);
      window.location.href = "/Frontend/index.html";
    }

    function getCategories() {
      return JSON.parse(localStorage.getItem(CATEGORIES_KEY)) || ["Sneaker", "Running", "Casual"];
    }

    function saveCategories(categories) {
      localStorage.setItem(CATEGORIES_KEY, JSON.stringify(categories));
    }

    function renderAdminCategories() {
      const currentUser = JSON.parse(localStorage.getItem(USER_KEY));
      const container = document.getElementById("adminCategoriesContent");

      if (!currentUser || currentUser.role !== "admin") {
        container.innerHTML = `
          <div class="empty-box">
            Bạn không có quyền truy cập trang này.
          </div>
        `;
        return;
      }

      const categories = getCategories();

      container.innerHTML = `
        <div class="panel">
          <h1>Quản lý danh mục</h1>

          <form id="categoryForm">
            <div class="form-row">
              <input type="text" id="categoryName" placeholder="Nhập tên danh mục" required />
              <button type="submit" class="btn-dark" id="categorySubmitBtn">Thêm danh mục</button>
              <button type="button" class="btn-light" onclick="resetCategoryForm()">Làm mới</button>
            </div>
            <div id="categoryMsg" class="msg"></div>
          </form>
        </div>

        <div class="panel">
          <h2>Danh sách danh mục</h2>
          ${
            categories.length
              ? `
                <table>
                  <thead>
                    <tr>
                      <th>STT</th>
                      <th>Tên danh mục</th>
                      <th>Thao tác</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${categories.map((category, index) => `
                      <tr>
                        <td>${index + 1}</td>
                        <td>${category}</td>
                        <td>
                          <button class="btn-edit" onclick="editCategory(${index})">Sửa</button>
                          <button class="btn-danger" onclick="deleteCategory(${index})">Xóa</button>
                        </td>
                      </tr>
                    `).join("")}
                  </tbody>
                </table>
              `
              : `<div>Chưa có danh mục.</div>`
          }
        </div>
      `;

      document.getElementById("categoryForm").addEventListener("submit", handleCategorySubmit);
    }

    function handleCategorySubmit(event) {
      event.preventDefault();

      const name = document.getElementById("categoryName").value.trim();
      const msg = document.getElementById("categoryMsg");
      const categories = getCategories();

      if (!name) {
        msg.style.color = "red";
        msg.textContent = "Tên danh mục không được để trống.";
        return;
      }

      if (editingCategoryIndex !== null) {
        const duplicated = categories.find((item, index) => item.toLowerCase() === name.toLowerCase() && index !== editingCategoryIndex);
        if (duplicated) {
          msg.style.color = "red";
          msg.textContent = "Danh mục đã tồn tại.";
          return;
        }

        const oldName = categories[editingCategoryIndex];
        categories[editingCategoryIndex] = name;
        saveCategories(categories);

        msg.style.color = "green";
        msg.textContent = "Cập nhật danh mục thành công.";

        addNotification({
          title: "Cập nhật danh mục",
          message: `Admin vừa đổi danh mục "${oldName}" thành "${name}".`,
          role: "admin",
          type: "success"
        });
      } else {
        const duplicated = categories.find(item => item.toLowerCase() === name.toLowerCase());
        if (duplicated) {
          msg.style.color = "red";
          msg.textContent = "Danh mục đã tồn tại.";
          return;
        }

        categories.push(name);
        saveCategories(categories);

        msg.style.color = "green";
        msg.textContent = "Thêm danh mục thành công.";

        addNotification({
          title: "Danh mục mới",
          message: `Admin vừa thêm danh mục "${name}".`,
          role: "admin",
          type: "success"
        });
      }

      resetCategoryForm(false);
      setTimeout(() => renderAdminCategories(), 400);
    }

    function editCategory(index) {
      const categories = getCategories();
      const category = categories[index];
      if (category === undefined) return;

      editingCategoryIndex = index;
      document.getElementById("categoryName").value = category;
      document.getElementById("categorySubmitBtn").textContent = "Cập nhật danh mục";
      document.getElementById("categoryMsg").style.color = "#1d3557";
      document.getElementById("categoryMsg").textContent = "Đang chỉnh sửa danh mục.";

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function resetCategoryForm(reload = true) {
      editingCategoryIndex = null;

      const form = document.getElementById("categoryForm");
      if (form) form.reset();

      const submitBtn = document.getElementById("categorySubmitBtn");
      if (submitBtn) submitBtn.textContent = "Thêm danh mục";

      const msg = document.getElementById("categoryMsg");
      if (msg) msg.textContent = "";

      if (reload) renderAdminCategories();
    }

    function deleteCategory(index) {
      if (!confirm("Bạn có chắc muốn xóa danh mục này?")) return;

      const categories = getCategories();
      const deleted = categories[index];
      categories.splice(index, 1);
      saveCategories(categories);

      addNotification({
        title: "Xóa danh mục",
        message: `Admin vừa xóa danh mục "${deleted}".`,
        role: "admin",
        type: "warning"
      });

      renderAdminCategories();
    }

    seedNotifications();
    loadComponent("header", "/components/header.html");
    loadComponent("footer", "/components/footer.html");
    renderAdminCategories();
  </script>
</body>
</html>
