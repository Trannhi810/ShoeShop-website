<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đơn hàng của tôi - ShoeShop</title>
  <link rel="stylesheet" href="/Frontend/css/layout.css" />
  <style>
    .page {
      width: 1200px;
      max-width: calc(100% - 40px);
      margin: 32px auto;
    }

    .page h1 {
      font-size: 34px;
      margin-bottom: 22px;
    }

    .orders-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .order-card {
      background: white;
      border: 1px solid #e5e5e5;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.04);
    }

    .order-top {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .order-id {
      font-size: 20px;
      font-weight: bold;
    }

    .order-status {
      padding: 8px 12px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 14px;
      display: inline-block;
    }

    .status-pending {
      background: #fff3cd;
      color: #856404;
    }

    .status-shipping {
      background: #d1ecf1;
      color: #0c5460;
    }

    .status-completed {
      background: #d4edda;
      color: #155724;
    }

    .status-cancelled {
      background: #f8d7da;
      color: #721c24;
    }

    .order-info {
      color: #555;
      margin-bottom: 14px;
      line-height: 1.7;
    }

    .order-items {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 14px;
    }

    .order-item {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 1px solid #eee;
      padding-bottom: 8px;
    }

    .order-total {
      text-align: right;
      font-size: 22px;
      font-weight: bold;
      color: #d62828;
    }

    .empty-box {
      background: white;
      border: 1px dashed #ccc;
      border-radius: 16px;
      padding: 30px;
      text-align: center;
      color: #666;
      font-size: 18px;
    }

    .btn-dark {
      display: inline-block;
      background: #111;
      color: white;
      text-decoration: none;
      padding: 12px 18px;
      border-radius: 10px;
      font-weight: 600;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div id="header"></div>

  <main class="page">
    <h1>Đơn hàng của tôi</h1>
    <div id="ordersList" class="orders-list"></div>
  </main>

  <div id="footer"></div>

  <script>
    const USER_KEY = "shoeshop_current_user_v1";
    const ORDERS_KEY = "shoeshop_orders_v1";

    async function loadComponent(id, file) {
      const res = await fetch(file);
      const html = await res.text();
      document.getElementById(id).innerHTML = html;

      if (id === "header") {
        renderHeaderAuth();
      }
    }

    function renderHeaderAuth() {
  const headerRight = document.getElementById("headerRight");
  if (!headerRight) return;

  const currentUser = JSON.parse(localStorage.getItem(USER_KEY));

  if (currentUser) {
    let extraLink = "";

    if (currentUser.role === "admin") {
      extraLink = `<a class="header-link" href="/Frontend/pages/admin-dashboard.html">Admin</a>`;
    } else if (currentUser.role === "staff") {
      extraLink = `<a class="header-link" href="/Frontend/pages/staff-dashboard.html">Staff</a>`;
    }

    headerRight.innerHTML = `
      <div id="notificationBellArea"></div>
      ${extraLink}
      <span class="user-text">Xin chào, ${currentUser.fullName || currentUser.email}</span>
      <button class="header-btn" onclick="logout()">Đăng xuất</button>
    `;

    renderNotificationBell();
  } else {
    headerRight.innerHTML = `
      <a class="header-link" href="/Frontend/pages/login.html">Đăng nhập</a>
      <a class="header-link" href="/Frontend/pages/register.html">Đăng ký</a>
    `;
  }
}

    function logout() {
      localStorage.removeItem(USER_KEY);
      window.location.href = "/Frontend/index.html";
    }

    function getOrders() {
      return JSON.parse(localStorage.getItem(ORDERS_KEY)) || [];
    }

    function getStatusClass(status) {
      if (status === "Chờ xử lý") return "status-pending";
      if (status === "Đang giao") return "status-shipping";
      if (status === "Hoàn tất") return "status-completed";
      if (status === "Hủy") return "status-cancelled";
      return "status-pending";
    }

    function renderOrders() {
      const currentUser = JSON.parse(localStorage.getItem(USER_KEY));
      const container = document.getElementById("ordersList");

      if (!currentUser) {
        container.innerHTML = `
          <div class="empty-box">
            Bạn cần đăng nhập để xem đơn hàng.<br>
            <a class="btn-dark" href="/Frontend/pages/login.html">Đăng nhập ngay</a>
          </div>
        `;
        return;
      }

      const orders = getOrders().filter(order => order.userId === currentUser.id);

      if (!orders.length) {
        container.innerHTML = `
          <div class="empty-box">
            Bạn chưa có đơn hàng nào.<br>
            <a class="btn-dark" href="/Frontend/pages/products.html">Mua sắm ngay</a>
          </div>
        `;
        return;
      }

      container.innerHTML = orders.map(order => `
        <div class="order-card">
          <div class="order-top">
            <div>
              <div class="order-id">Mã đơn: #${order.id}</div>
              <div>Ngày đặt: ${order.createdAt}</div>
            </div>
            <div class="order-status ${getStatusClass(order.status)}">${order.status}</div>
          </div>

          <div class="order-info">
            Người nhận: ${order.customerName}<br>
            Email: ${order.email}<br>
            SĐT: ${order.phone}<br>
            Địa chỉ: ${order.address}<br>
            Thanh toán: ${order.paymentMethod}
          </div>

          <div class="order-items">
            ${order.items.map(item => `
              <div class="order-item">
                <span>${item.name} x ${item.quantity}</span>
                <strong>${(item.price * item.quantity).toLocaleString("vi-VN")}đ</strong>
              </div>
            `).join("")}
          </div>

          <div class="order-total">Tổng tiền: ${order.total.toLocaleString("vi-VN")}đ</div>
        </div>
      `).join("");
    }

    loadComponent("header", "/components/header.html");
    loadComponent("footer", "/components/footer.html");
    renderOrders();
  </script>
</body>
</html>
