<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập - ShoeShop</title>
  <link rel="stylesheet" href="/Frontend/css/layout.css" />
  <link rel="stylesheet" href="/Frontend/css/auth.css" />
  <style>
    .auth-page {
      min-height: 75vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
      background: linear-gradient(135deg, #f6f6f6, #ffffff);
    }

    .auth-box {
      width: 430px;
      max-width: 100%;
      background: white;
      border: 1px solid #e5e5e5;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 14px 40px rgba(0,0,0,0.08);
    }

    .auth-box h1 {
      margin-bottom: 10px;
      font-size: 32px;
    }

    .auth-subtitle {
      color: #666;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .auth-form label {
      font-weight: 600;
    }

    .auth-form input {
      padding: 12px 14px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
    }

    .auth-form input:focus {
      border-color: #111;
    }

    .auth-form button {
      margin-top: 8px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #111;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    .auth-bottom {
      margin-top: 18px;
      text-align: center;
    }

    .auth-bottom a {
      font-weight: 700;
      color: #111;
      text-decoration: none;
    }

    .demo-box {
      margin-top: 20px;
      background: #f7f7f7;
      border-radius: 12px;
      padding: 14px;
      font-size: 14px;
      color: #444;
      line-height: 1.6;
    }

    .msg {
      margin-top: 14px;
      font-size: 14px;
      color: #d62828;
      min-height: 20px;
    }

    .google-btn {
      margin-top: 12px;
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: white;
      cursor: pointer;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="header"></div>

  <main class="auth-page">
    <div class="auth-box">
      <h1>Đăng nhập</h1>
      <p class="auth-subtitle">Đăng nhập để mua sắm, quản lý giỏ hàng và theo dõi đơn hàng.</p>

      <form class="auth-form" id="loginForm">
        <label for="loginEmail">Email</label>
        <input id="loginEmail" type="email" placeholder="Nhập email" required />

        <label for="loginPassword">Mật khẩu</label>
        <input id="loginPassword" type="password" placeholder="Nhập mật khẩu" required />

        <button type="submit">Đăng nhập</button>
      </form>

      <button class="google-btn" type="button" onclick="fakeGoogleLogin()">
        Đăng nhập với Google
      </button>
      <div id="loginMessage" class="msg"></div>

      <p class="auth-bottom">
        Chưa có tài khoản?
        <a href="/Frontend/pages/register.html">Đăng ký ngay</a>
      </p>
    </div>
  </main>

  <div id="footer"></div>

  <script src="/Frontend/js/notify.js"></script>
  <script>
    const PRODUCTS_KEY = "shoeshop_products_v1";
    const USERS_KEY = "shoeshop_users_v1";
    const CART_KEY = "shoeshop_cart_v1";

    const defaultProducts = [
      {
        id: 1,
        name: "Nike Air Force 1",
        price: 2200000,
        category: "Sneaker",
        image: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=900&q=80",
        description: "Thiết kế trẻ trung, dễ phối đồ."
      }
    ];

    const defaultUsers = [
  {
    id: 1,
    fullName: "Admin",
    email: "admin@gmail.com",
    password: "123456",
    role: "admin",
    isBlocked: false,
    loginProvider: "email"
  },
  {
    id: 2,
    fullName: "Staff",
    email: "staff@gmail.com",
    password: "123456",
    role: "staff",
    isBlocked: false,
    loginProvider: "email"
  },
  {
    id: 3,
    fullName: "Customer",
    email: "customer@gmail.com",
    password: "123456",
    role: "customer",
    isBlocked: false,
    loginProvider: "email"
  }
];

    function seedData() {
      if (!localStorage.getItem(USERS_KEY)) {
        localStorage.setItem(USERS_KEY, JSON.stringify(defaultUsers));
      } else {
        const users = JSON.parse(localStorage.getItem(USERS_KEY)) || [];
        const normalizedUsers = users.map(user => ({
          ...user,
          isBlocked: user.isBlocked ?? false,
          loginProvider: user.loginProvider || "email"
        }));
        localStorage.setItem(USERS_KEY, JSON.stringify(normalizedUsers));
      }
    }

    async function loadComponent(id, file) {
      try {
        const res = await fetch(file);
        const html = await res.text();
        document.getElementById(id).innerHTML = html;

        if (id === "header") {
          renderHeaderAuth();
        }
      } catch (error) {
        console.log("Lỗi load component:", error);
      }
    }

    function renderHeaderAuth() {
      const headerRight = document.getElementById("headerRight");
      if (!headerRight) return;

      const currentUser = JSON.parse(localStorage.getItem(USER_KEY));

      if (currentUser) {
        let extraLink = "";

        if (currentUser.role === "admin") {
          extraLink = `<a class="header-link" href="/Frontend/pages/admin-dashboard.html">Admin</a>`;
        } else if (currentUser.role === "staff") {
          extraLink = `<a class="header-link" href="/Frontend/pages/staff-dashboard.html">Staff</a>`;
        }

        headerRight.innerHTML = `
          <div id="notificationBellArea"></div>
          ${extraLink}
          <span class="user-text">Xin chào, ${currentUser.fullName || currentUser.email}</span>
          <button class="header-btn" onclick="logout()">Đăng xuất</button>
        `;

        if (typeof renderNotificationBell === "function") {
          renderNotificationBell();
        }
      } else {
        headerRight.innerHTML = `
          <a class="header-link" href="/Frontend/pages/login.html">Đăng nhập</a>
          <a class="header-link" href="/Frontend/pages/register.html">Đăng ký</a>
        `;
      }
    }

    function logout() {
      localStorage.removeItem(USER_KEY);
      window.location.href = "/Frontend/index.html";
    }

    function getUsers() {
      return JSON.parse(localStorage.getItem(USERS_KEY)) || [];
    }

    function handleLogin(event) {
      event.preventDefault();

      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;
      const message = document.getElementById("loginMessage");

      message.style.color = "#d62828";
      message.textContent = "";

      const users = getUsers();
      const user = users.find(item => item.email === email && item.password === password);

      if (!user) {
        message.textContent = "Sai email hoặc mật khẩu.";
        return;
      }

      if (user.isBlocked) {
        message.textContent = "Tài khoản của bạn đã bị khóa.";
        return;
      }

      localStorage.setItem(USER_KEY, JSON.stringify(user));
      message.style.color = "green";
      message.textContent = "Đăng nhập thành công. Đang chuyển trang...";

      setTimeout(() => {
        redirectByRole(user);
      }, 800);
    }

    function fakeGoogleLogin() {
      const message = document.getElementById("loginMessage");
      message.style.color = "#d62828";
      message.textContent = "Chức năng Google Login đang mô phỏng ở frontend, chưa kết nối backend OAuth2.";
    }

    seedData();
    if (typeof seedNotifications === "function") {
      seedNotifications();
    }
    loadComponent("header", "/Frontend/components/header.html");
    loadComponent("footer", "/Frontend/components/footer.html");
    document.getElementById("loginForm").addEventListener("submit", handleLogin);

  function fakeGoogleLogin() {
  const message = document.getElementById("loginMessage");
  const users = getUsers();

  const googleEmail = prompt("Nhập email Google để mô phỏng đăng nhập:", "googleuser@gmail.com");
  if (!googleEmail) return;

  const email = googleEmail.trim().toLowerCase();

  if (!email.includes("@")) {
    message.style.color = "red";
    message.textContent = "Email Google không hợp lệ.";
    return;
  }

  let user = users.find(item => item.email.toLowerCase() === email);

  if (user) {
    if (user.isBlocked) {
      message.style.color = "red";
      message.textContent = "Tài khoản Google này đã bị khóa.";
      return;
    }

    localStorage.setItem(USER_KEY, JSON.stringify(user));
    message.style.color = "green";
    message.textContent = "Đăng nhập Google thành công. Đang chuyển trang...";

    setTimeout(() => redirectByRole(user), 800);
    return;
  }

  const nameFromEmail = email.split("@")[0];

  const newGoogleUser = {
    id: generateUserId(users),
    fullName: nameFromEmail,
    email,
    password: "",
    role: "customer",
    isBlocked: false,
    loginProvider: "google"
  };

  users.unshift(newGoogleUser);
  localStorage.setItem(USERS_KEY, JSON.stringify(users));
  localStorage.setItem(USER_KEY, JSON.stringify(newGoogleUser));

  message.style.color = "green";
  message.textContent = "Tạo tài khoản Google mới và đăng nhập thành công.";

  setTimeout(() => redirectByRole(newGoogleUser), 800);
}
function redirectByRole(user) {
  if (user.role === "admin") {
    window.location.href = "/Frontend/pages/admin-dashboard.html";
    return;
  }

  if (user.role === "staff") {
    window.location.href = "/Frontend/pages/staff-dashboard.html";
    return;
  }

  window.location.href = "/Frontend/index.html";
}

function generateUserId(users) {
  if (!users.length) return 1;
  return Math.max(...users.map(u => Number(u.id))) + 1;
}
  </script>
</body>
</html>
