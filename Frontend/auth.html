<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoe Shop - Xác Thực Hệ Thống</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --secondary: #ec4899;
            --bg-color: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --surface-light: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Background Animations */
        .ambient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: float 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: rgba(99, 102, 241, 0.4);
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: rgba(236, 72, 153, 0.3);
            bottom: -150px;
            right: -100px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 30px) scale(1.1); }
            100% { transform: translate(-30px, -50px) scale(0.9); }
        }

        /* Container & Glassmorphism */
        .auth-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            margin: 40px 0; /* Add margin to support scrolling for taller reg forms */
        }

        /* Header Toggle */
        .auth-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            position: relative;
        }

        .auth-header::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--surface-light);
            border-radius: 2px;
        }

        .toggle-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            padding: 10px 0;
            transition: all 0.3s ease;
            position: relative;
            flex: 1;
        }

        .toggle-btn.active {
            color: var(--text-main);
        }

        .toggle-indicator {
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 50%;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border-radius: 2px;
        }

        /* Forms */
        .form-slider {
            display: flex;
            width: 200%;
            transition: transform 0.4s ease-in-out;
            align-items: flex-start;
        }

        .form-section {
            width: 50%;
            padding: 0;
            flex-shrink: 0;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
            pointer-events: none;
        }
        
        .form-section.active {
            opacity: 1;
            pointer-events: auto;
            transition-delay: 0.1s;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group i.input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            transition: color 0.3s ease;
        }

        /* Stylings for Show/Hide Password Eye */
        .input-group i.password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.3s ease;
            z-index: 2;
        }
        
        .input-group i.password-toggle:hover {
            color: var(--primary-light);
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 16px 16px 16px 45px;
            background: var(--surface-light);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            appearance: none;
        }
        
        .input-group select option {
            background: var(--bg-color);
            color: var(--text-main);
        }

        .input-group input:focus, .input-group select:focus {
            border-color: var(--primary-light);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
        }

        .input-group input:focus + i.input-icon, .input-group select:focus + i.input-icon,
        .input-group input:not(:placeholder-shown) ~ i.input-icon {
            color: var(--primary-light);
        }
        
        .hint-text {
            display: block;
            margin-top: -10px;
            margin-bottom: 15px;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: left;
            padding-left: 5px;
            font-style: italic;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-top: 10px;
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4);
        }

        .btn-submit:hover::before {
            left: 100%;
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        /* Message Box */
        .message-box {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.9rem;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            display: none;
        }

        .message-box.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .message-box.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .message-box.success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
        }
        
        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

    </style>
</head>
<body>

    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>

    <div class="auth-container">
        <div class="auth-header">
            <button class="toggle-btn active" onclick="switchTab('login')">Đăng Nhập</button>
            <button class="toggle-btn" onclick="switchTab('register')">Đăng Ký Khởi Tạo</button>
            <div class="toggle-indicator" id="indicator"></div>
        </div>

        <div class="form-slider" id="form-slider">
            <!-- Form Đăng Nhập -->
            <div class="form-section active" id="section-login">
                <form id="login-form" onsubmit="handleLogin(event)">
                    <div class="input-group">
                        <input type="email" id="login-email" placeholder="Email hoặc tên tài khoản" required>
                        <i class="fa-solid fa-envelope input-icon"></i>
                    </div>
                    <div class="input-group">
                        <input type="password" id="login-password" placeholder="Mật khẩu" required>
                        <i class="fa-solid fa-lock input-icon"></i>
                        <i class="fa-solid fa-eye password-toggle" onclick="togglePassword('login-password', this)"></i>
                    </div>
                    <button type="submit" class="btn-submit" id="btn-login">
                        <span class="btn-text">Đăng nhập</span>
                        <div class="loading-spinner"></div>
                    </button>
                </form>
            </div>

            <!-- Form Đăng Ký -->
            <div class="form-section" id="section-register">
                <form id="register-form" onsubmit="handleRegister(event)">
                    <div class="input-group">
                        <input type="text" id="reg-name" placeholder="Họ và tên" required>
                        <i class="fa-solid fa-user input-icon"></i>
                    </div>
                    <div class="input-group">
                        <input type="email" id="reg-email" placeholder="Email" required>
                        <i class="fa-solid fa-envelope input-icon"></i>
                    </div>
                    
                    <div class="input-group">
                        <input type="password" id="reg-password" placeholder="Mật khẩu" required minlength="4">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <i class="fa-solid fa-eye password-toggle" onclick="togglePassword('reg-password', this)"></i>
                    </div>
                    
                    <div class="input-group">
                        <input type="password" id="reg-confirm-password" placeholder="Xác nhận mật khẩu" required minlength="4">
                        <i class="fa-solid fa-shield-halved input-icon"></i>
                        <i class="fa-solid fa-eye password-toggle" onclick="togglePassword('reg-confirm-password', this)"></i>
                    </div>

                    <div class="input-group">
                        <input type="text" id="reg-phone" placeholder="Số điện thoại">
                        <i class="fa-solid fa-phone input-icon"></i>
                    </div>

                    <div class="input-group">
                        <input type="text" id="reg-address" placeholder="Địa chỉ giao hàng">
                        <i class="fa-solid fa-map-location-dot input-icon"></i>
                    </div>

                    <span class="hint-text">* Số điện thoại và địa chỉ không bắt buộc, bạn có thể bổ sung ở hồ sơ người dùng sau khi đăng nhập thành công.</span>

                    <button type="submit" class="btn-submit" id="btn-register">
                        <span class="btn-text">Tạo Tài Khoản</span>
                        <div class="loading-spinner"></div>
                    </button>
                </form>
            </div>
        </div>

        <div id="message-box" class="message-box"></div>
    </div>

    <script>
        function switchTab(tab) {
            const slider = document.getElementById('form-slider');
            const indicator = document.getElementById('indicator');
            const btns = document.querySelectorAll('.toggle-btn');
            const sectionLogin = document.getElementById('section-login');
            const sectionRegister = document.getElementById('section-register');
            
            showMessage('', ''); // clear msg

            if (tab === 'login') {
                slider.style.transform = 'translateX(0)';
                indicator.style.transform = 'translateX(0)';
                btns[0].classList.add('active');
                btns[1].classList.remove('active');
                sectionLogin.classList.add('active');
                sectionRegister.classList.remove('active');
            } else {
                slider.style.transform = 'translateX(-50%)';
                indicator.style.transform = 'translateX(100%)';
                btns[1].classList.add('active');
                btns[0].classList.remove('active');
                sectionRegister.classList.add('active');
                sectionLogin.classList.remove('active');
            }
        }

        // 👁️ Toggle Show/Hide Password
        function togglePassword(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        function showMessage(msg, type) {
            const box = document.getElementById('message-box');
            if (!msg) {
                box.classList.remove('show');
                return;
            }
            box.className = `message-box ${type} show`;
            box.innerText = msg;
        }

        function toggleLoading(btnId, isLoading) {
            const btn = document.getElementById(btnId);
            const text = btn.querySelector('.btn-text');
            const spinner = btn.querySelector('.loading-spinner');
            
            if(isLoading){
                text.style.display = 'none';
                spinner.style.display = 'block';
                btn.disabled = true;
            } else {
                text.style.display = 'block';
                spinner.style.display = 'none';
                btn.disabled = false;
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            toggleLoading('btn-login', true);
            showMessage('', '');

            try {
                const res = await fetch('/api/users/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                
                if (res.ok) {
                    showMessage('Đăng nhập thành công! Đang chuyển hướng...', 'success');
                    // Lưu JWT Token và thông tin user vào localStorage
                    localStorage.setItem('shoeshop_token', data.token);
                    localStorage.setItem('shoeshop_user', JSON.stringify(data.user));
                    
                    setTimeout(() => {
                        window.location.href = '/index.html'; // Điều hướng vào trang chính
                    }, 1000);
                } else {
                    showMessage(data.message || 'Sai thông tin đăng nhập', 'error');
                }
            } catch (error) {
                showMessage('Lỗi kết nối tới máy chủ', 'error');
            } finally {
                toggleLoading('btn-login', false);
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const fullName = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const confirmPassword = document.getElementById('reg-confirm-password').value;
            const phone = document.getElementById('reg-phone').value;
            const address = document.getElementById('reg-address').value;

            // Simple validation cho confirm password
            if (password !== confirmPassword) {
                showMessage('Mật khẩu xác nhận không trùng khớp!', 'error');
                return;
            }
            
            toggleLoading('btn-register', true);
            showMessage('', '');

            try {
                const payload = { fullName, email, password };
                if (phone) payload.phone = phone;
                if (address) payload.address = address;

                const res = await fetch('/api/users/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                
                if (res.ok) {
                    showMessage('Tạo tài khoản thành công! Tự động đăng nhập...', 'success');
                    localStorage.setItem('shoeshop_token', data.token);
                    localStorage.setItem('shoeshop_user', JSON.stringify(data.user));
                    
                    setTimeout(() => {
                        window.location.href = '/index.html'; 
                    }, 1500);
                } else {
                    showMessage(data.message || 'Đăng ký thất bại', 'error');
                }
            } catch (error) {
                showMessage('Lỗi kết nối tới máy chủ', 'error');
            } finally {
                toggleLoading('btn-register', false);
            }
        }

        // Chạy lúc mới vào trang để kiểm tra nếu có token đã login rồi thì đưa về index
        window.onload = () => {
            if(localStorage.getItem('shoeshop_token')){
                window.location.href = '/index.html';
            }
        }
    </script>
</body>
</html>
